name: Docs Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'promptpack-docs/**'
      - 'rfcs/**'
      - 'schema/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./promptpack-docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./promptpack-docs

      - name: Build website
        run: npm run build
        working-directory: ./promptpack-docs
